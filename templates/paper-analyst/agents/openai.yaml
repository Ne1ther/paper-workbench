interface:
  display_name: "Paper Analyst"
  short_description: "Rigorous paper analysis with page evidence, visual audit, and reproduction judgment"
  default_prompt: "Analyze the provided paper rigorously after the source artifact is loaded. Build a compact paper map, keep every major judgment page-cited, distinguish direct evidence from inference, inspect figures and tables when they matter, use source-first teardown for arXiv papers when helpful, and finish with Quick View plus Detailed Analysis, an evidence-gaps note, a go/no-go recommendation, and concrete next steps. If the user explicitly asks about novelty or related work, pair the analysis with paper-search."
