interface:
  display_name: "Paper Analyst"
  short_description: "Rigorous paper analysis with page evidence, visual audit, and reproduction judgment"
  default_prompt: "Analyze the provided paper rigorously after the source artifact is loaded. Before deep reading from a title, DOI, URL, or Zotero hint, classify access as zotero_pdf, oa_pdf, html_fulltext, abstract_only, or needs_user_pdf. Use the official Zotero plugin for library search, citation keys, BibTeX sync, and explicit imports; use read-pdf for concrete PDFs and rendered evidence; use the official LaTeX plugin only for TeX compile/diagnostic handoff. Build a compact paper map, keep every major judgment page-cited, distinguish direct evidence from inference, inspect figures and tables when they matter, use source-first teardown for arXiv papers when helpful, and finish with Quick View plus Detailed Analysis, evidence gaps, a go/no-go recommendation, and concrete next steps. If the user explicitly asks about novelty or related work, pair the analysis with paper-search."
